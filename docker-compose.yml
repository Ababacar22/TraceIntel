version: '3.8'
services:
  db:
    image: postgres:15
    container_name: traceintel-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: traceintel_db
    ports:
      - '5440:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: traceintel-redis
    restart: always
    ports:
      - '6385:6379'
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    container_name: traceintel-neo4j
    restart: always
    ports:
      - '7474:7474' # HTTP
      - '7687:7687' # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

volumes:
  db_data:
  redis_data:
  neo4j_data:
